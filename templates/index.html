<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Generation System</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center">

    <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl shadow-2xl p-10 w-[90%] max-w-3xl text-center">

        <div class="text-6xl mb-4">
            🎵
        </div>

        <h1 class="text-5xl font-bold text-white mb-4">
            AI Music Generation System
        </h1>

        <p class="text-gray-300 text-lg mb-8">
            Generate original music compositions using
            Deep Learning, LSTM Networks and Artificial Intelligence.
        </p>

        <div class="grid md:grid-cols-3 gap-4 mb-10">

            <div class="bg-white/10 rounded-xl p-4">
                <h3 class="text-purple-300 font-semibold">
                    Dataset
                </h3>
                <p class="text-gray-300 text-sm">
                    MAESTRO MIDI Dataset
                </p>
            </div>

            <div class="bg-white/10 rounded-xl p-4">
                <h3 class="text-purple-300 font-semibold">
                    Model
                </h3>
                <p class="text-gray-300 text-sm">
                    LSTM Neural Network
                </p>
            </div>

            <div class="bg-white/10 rounded-xl p-4">
                <h3 class="text-purple-300 font-semibold">
                    Output
                </h3>
                <p class="text-gray-300 text-sm">
                    AI Generated MIDI Music
                </p>
            </div>

        </div>

        <a href="/generate">
            <button class="bg-purple-600 hover:bg-purple-700 transition-all duration-300 px-8 py-4 rounded-xl text-white font-semibold text-lg shadow-lg">
                Generate Music
            </button>
        </a>

    </div>

</body>
</html>
